name: PVR Odyssey IMAX Poller

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # manual trigger from GitHub

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen-shows cache
        uses: actions/cache@v4
        with:
          path: seen_shows.json
          key: seen-shows-${{ runner.os }}
          restore-keys: seen-shows-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run poller
        env:
          TWILIO_SID:   ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM:  ${{ secrets.TWILIO_FROM }}
          MY_PHONE:     ${{ secrets.MY_PHONE }}
        run: python check_pvr.py

      - name: Save seen-shows cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_shows.json
          key: seen-shows-${{ runner.os }}-${{ github.run_id }}
